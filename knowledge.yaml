id: UserAdminService
name: Whydah User Admin Service
version: 2.30.8-SNAPSHOT
description: |
  REST API service for user administration in the Whydah platform. Provides
  endpoints for creating, updating, and managing users, roles, and applications.
  Consumed by UserAdminWebApp and other admin clients.
units:
  - id: user-api
    name: User API
    type: api
    description: User CRUD REST endpoints for creating, reading, updating, and deleting users.
    path: src/main/java/net/whydah/useradminservice
